<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Access Denied</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
</head>
<body>
    <div th:replace="~{fragments/header :: siteHeader}"></div>
    <main class="page-main">
        <div class="container page-container">
            <section class="page-card">
                <header class="page-header">
                    <p class="eyebrow">Security Notice</p>
                    <h1>Access Denied</h1>
                    <p>Your current account does not have permission to open the requested page.</p>
                </header>

                <section class="empty-state">
                    <div class="section-heading">
                        <h2>Role-Based Access Is Enforced</h2>
                        <p>Students, tutors, and administrators can only open the routes assigned to their approved active role.</p>
                    </div>
                    <div class="action-group">
                        <a class="primary-button" th:href="@{/}" href="/">Return Home</a>
                    </div>
                </section>
            </section>
        </div>
    </main>
    <div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
