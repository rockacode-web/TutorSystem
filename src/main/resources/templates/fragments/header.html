<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<header class="site-header" th:fragment="siteHeader">
    <div class="container site-header-inner">
        <div class="site-branding">
            <p class="site-kicker">Academic Support</p>
            <a class="site-title" th:href="@{/}" href="/">Academic Tutoring Portal</a>
        </div>
        <nav class="site-nav" aria-label="Primary navigation">
            <a th:if="${isAuthenticated}" th:href="@{/}" href="/">Home</a>
            <a th:if="${isStudent}" th:href="@{/student/book}" href="/student/book">Book Session</a>
            <a th:if="${isStudent}" th:href="@{/student/schedule}" href="/student/schedule">My Schedule</a>
            <a th:if="${isTutor}" th:href="@{/tutor/schedule}" href="/tutor/schedule">Tutor Schedule</a>
            <a th:if="${isAdmin}" th:href="@{/admin/dashboard}" href="/admin/dashboard">Dashboard</a>
            <a th:if="${isAdmin}" th:href="@{/admin/pending-users}" href="/admin/pending-users">Pending Users</a>
            <a th:if="${isAdmin}" th:href="@{/admin/users}" href="/admin/users">Users</a>
            <a th:if="${isAdmin}" th:href="@{/admin/reports}" href="/admin/reports">Reports</a>
            <a th:if="${!isAuthenticated}" th:href="@{/login}" href="/login">Login</a>
            <a th:if="${!isAuthenticated}" th:href="@{/register}" href="/register">Register</a>
        </nav>
        <div class="site-account" th:if="${isAuthenticated}">
            <div class="account-summary">
                <span class="account-role" th:text="${currentRoleLabel}">Role</span>
                <span class="account-name"
                      th:text="${'Welcome, ' + currentDisplayName + ' (' + currentRoleLabel + ')'}">Welcome, User (Role)</span>
            </div>
            <form th:action="@{/logout}" action="/logout" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="secondary-button" type="submit">Logout</button>
            </form>
        </div>
    </div>
</header>
</body>
</html>
